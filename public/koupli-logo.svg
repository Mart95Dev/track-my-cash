<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="shape">
      <rect x="0" y="0" width="512" height="512" rx="112"/>
    </clipPath>
  </defs>
  <!-- Background: two-tone purple -->
  <g clip-path="url(#shape)">
    <rect x="0" y="0" width="512" height="512" fill="#7F77DD"/>
    <rect x="0" y="256" width="512" height="256" fill="#534AB7"/>
  </g>
  <!-- K monogram: vertical bar + chevron -->
  <line x1="186" y1="148" x2="186" y2="364" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round"/>
  <polyline points="230,148 340,256 230,364" stroke="#EEEDFE" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
